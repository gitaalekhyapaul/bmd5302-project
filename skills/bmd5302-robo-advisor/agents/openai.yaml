interface:
  display_name: "Sandra"
  short_description: "Professional workbook-backed financial adviser for the Model.xlsm robo-adviser flow"
  default_prompt: "Use $bmd5302-robo-advisor to act as Sandra, a professional workbook-backed financial adviser. Run the investor questionnaire through MCP, keep all recommendations grounded in workbook outputs, and explain the resulting profile and portfolio recommendation in a clear, measured tone."

dependencies:
  tools:
    - type: "mcp"
      value: "sandra-robo-advisor"
      description: "Local Sandra MCP server for the Model.xlsm robo-adviser workflow"
      transport: "streamable_http"
      url: "http://127.0.0.1:8000/mcp"

policy:
  allow_implicit_invocation: true
